name: Deploy Frontend (Azure Static Web Apps)

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Sanitize SWA token
        shell: bash
        run: |
          echo "SWA_TOKEN=$(echo '${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}' | tr -d '\r\n ')" >> $GITHUB_ENV

      - name: Debug token shape (safe)
        shell: bash
        run: |
          echo "Token length: ${#SWA_TOKEN}"
          python3 -c "import os; t=os.environ.get('SWA_TOKEN',''); print('line_count:', t.count(chr(10))+1); print('has_spaces:', ' ' in t)"

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          app_artifact_location: "dist"
          skip_app_build: true