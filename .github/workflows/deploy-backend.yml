name: Deploy Backend (Azure Functions)

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build
        run: |
          dotnet restore backend/OCPittem.Functions/OCPittem.Functions.csproj --configfile backend/OCPittem.Functions/nuget.config
          dotnet publish backend/OCPittem.Functions/OCPittem.Functions.csproj \
            -c Release \
            -o publish \
            --no-restore

      - name: Create zip package
        run: |
          cd publish
          zip -r ../func-package.zip .

      - name: Azure Login
        uses: Azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Flex Consumption
        run: |
          az functionapp deploy \
            --resource-group rg-ocpittem \
            --name func-ocpittem-2026 \
            --src-path func-package.zip \
            --type zip
