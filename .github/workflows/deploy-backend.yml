name: Deploy Backend (Azure Functions)

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build
        run: |
          dotnet restore backend/OCPittem.Functions/OCPittem.Functions.csproj --configfile backend/OCPittem.Functions/nuget.config
          dotnet publish backend/OCPittem.Functions/OCPittem.Functions.csproj -c Release -o publish --no-restore

      - name: Deploy
        uses: Azure/functions-action@v1
        with:
          app-name: "func-ocpittem-2026"
          package: "publish"
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}