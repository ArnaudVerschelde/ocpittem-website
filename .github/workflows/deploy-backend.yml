name: Deploy Backend (Azure Functions)

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build
        run: |
          dotnet restore backend/OCPittem.Functions/OCPittem.Functions.csproj --configfile backend/OCPittem.Functions/nuget.config
          dotnet publish backend/OCPittem.Functions/OCPittem.Functions.csproj \
            -c Release \
            -o publish \
            --no-restore

      - name: Azure Login
        uses: Azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Deploy to Flex Consumption
        run: |
          cd publish
          func azure functionapp publish func-ocpittem-2026 --dotnet-isolated --no-build

